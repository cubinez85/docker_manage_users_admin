services:
  # =============================================================================
  # PostgreSQL Database
  # =============================================================================
  db:
    image: postgres:15-alpine
    container_name: manage_users_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-manage_users_db}
      POSTGRES_USER: ${DB_USER:-manage_users_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-manage_users_admin} -d ${DB_NAME:-manage_users_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - "127.0.0.1:5432:5432"

  # =============================================================================
  # Django Application
  # =============================================================================
  django:
    image: cubinez85/manage_users-django:1.0.0
    container_name: manage_users_django
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_NAME: ${DB_NAME:-manage_users_db}
      DB_USER: ${DB_USER:-manage_users_admin}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: db
      DB_PORT: 5432
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,manage-users.cubinez.ru,django,nginx}
      DJANGO_SUPERUSER_USERNAME: ${DJANGO_SUPERUSER_USERNAME:-admin}
      DJANGO_SUPERUSER_EMAIL: ${DJANGO_SUPERUSER_EMAIL:-admin@cubinez.ru}
      DJANGO_SUPERUSER_PASSWORD: ${DJANGO_SUPERUSER_PASSWORD}
    volumes:
      - static_volume:/app/static
      - ./logs/django:/app/logs
    networks:
      - app_network
    expose:
      - "8000"

    # 🔧 Универсальная команда Gunicorn
    command: >
      gunicorn manage_users.wsgi:application
      --bind 0.0.0.0:8000
      --workers 3
      --timeout 120
      --keep-alive 5
      --max-requests 1000
      --max-requests-jitter 50
      --access-logfile -
      --error-logfile -
      --log-level info
      --capture-output

    # 🔧 Простой healthcheck на уровне сокета (не зависит от HTTP)
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(5); s.connect(('127.0.0.1', 8000)); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # =============================================================================
  # Nginx Reverse Proxy
  # =============================================================================
  nginx:
    image: nginx:alpine-slim
    container_name: manage_users_nginx
    restart: unless-stopped
    depends_on:
      django:
        condition: service_healthy
    ports:
      - "127.0.0.1:8081:80"
    volumes:
      - static_volume:/app/static:ro
      - ./logs/nginx:/var/log/nginx
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
    networks:
      - app_network
    command: ["nginx", "-g", "daemon off;"]
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

# =============================================================================
# Networks
# =============================================================================
networks:
  app_network:
    driver: bridge
    name: manage_users_network

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
    name: manage_users_postgres_data
  static_volume:
    name: manage_users_static
