# =============================================================================
# Nginx конфигурация для manage-users.cubinez.ru
# =============================================================================

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # =============================================================================
    # Логирование
    # =============================================================================
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # =============================================================================
    # Оптимизация
    # =============================================================================
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # =============================================================================
    # Gzip сжатие
    # =============================================================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # =============================================================================
    # Upstream Django (Gunicorn)
    # =============================================================================
    upstream django_app {
        server django:8000;
    }

    # =============================================================================
    # Server block
    # =============================================================================
    server {
        listen 80;
        server_name manage-users.cubinez.ru localhost;

        # Размер запроса
        client_max_body_size 10M;

        # =============================================================================
        # ✅ Healthcheck endpoint для Docker (без аутентификации!)
        # =============================================================================
        # Этот эндпоинт используется Docker healthcheck для проверки работоспособности
        # Важно: должен быть ПЕРВЫМ, чтобы не перехватывался другими location
        location = /nginx-health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # =============================================================================
        # Главная страница и API (с Basic Auth)
        # =============================================================================
        location / {
            auth_basic "Restricted Area";
            auth_basic_user_file /etc/nginx/.htpasswd;

            proxy_pass http://django_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $server_name;

            # Таймауты для долгих запросов
            proxy_connect_timeout 300;
            proxy_send_timeout 300;
            proxy_read_timeout 300;
        }

        # =============================================================================
        # Админка: без Nginx auth (авторизация через Django)
        # =============================================================================
        location /admin/ {
            auth_basic off;

            proxy_pass http://django_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $server_name;
        }

        # =============================================================================
        # API Документация: публичный доступ (без Basic Auth)
        # =============================================================================
        location /api/docs/ {
            auth_basic off;
            proxy_pass http://django_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $server_name;
        }

        location /api/redoc/ {
            auth_basic off;
            proxy_pass http://django_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $server_name;
        }

        location /api/schema/ {
            auth_basic off;
            proxy_pass http://django_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $server_name;
        }

        # =============================================================================
        # Статические файлы (кэширование на клиенте)
        # =============================================================================
        location /static/ {
            alias /app/static/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }
}
